name: CI (Self-hosted)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test (self-hosted)
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python (example)
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: |
          if command -v pytest >/dev/null 2>&1; then pytest -q; else echo "No tests configured"; fi

      - name: Start Streamlit detached (keeps running after job)
        run: |
          nohup setsid streamlit run app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true > streamlit.log 2>&1 < /dev/null &
          echo $! > streamlit.pid
          echo "Started streamlit PID=$(cat streamlit.pid)"

      - name: Verify Streamlit started
        run: |
          sleep 3
          if curl -sS http://localhost:8501 >/dev/null 2>&1; then echo "Streamlit reachable"; else echo "Warning: Streamlit not reachable"; fi
